<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoLocate - Under Maintenance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8fafc;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 480px;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon-wrapper {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 28px;
      box-shadow: 0 0 40px rgba(99,102,241,0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(99,102,241,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(99,102,241,0.6); }
    }
    .brand {
      font-size: 14px;
      font-weight: 600;
      color: #6366f1;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #f8fafc, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 16px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .progress-bar {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 100px;
      height: 6px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #6366f1);
      background-size: 200%;
      animation: shimmer 2s infinite;
      border-radius: 100px;
      width: 60%;
    }
    @keyframes shimmer {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 13px;
      color: #a5b4fc;
      font-weight: 500;
    }
    .dot {
      width: 8px; height: 8px;
      background: #6366f1;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .cek-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px;
      color: #a5b4fc;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .cek-btn:hover { background: rgba(99,102,241,0.25); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">🔧</div>
    <div class="brand">GeoLocate</div>
    <h1>Sedang Pemeliharaan</h1>
    <p>Sistem sedang dalam proses pemeliharaan dan pengembangan. Kami akan kembali sebentar lagi. Terima kasih atas kesabaranmu!</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="status-badge">
      <div class="dot"></div>
      Tim sedang bekerja keras...
    </div>
    <br>
    <a href="#" class="cek-btn" onclick="cekStatus()">Cek status</a>
  </div>

  <script>
    async function cekStatus() {
      try {
        const res = await fetch('/api/admin/check-maintenance');
        const data = await res.json();
        if (!data.maintenance) {
          window.location.href = '/app.html';
        } else {
          alert('Masih dalam pemeliharaan. Coba lagi nanti.');
        }
      } catch {
        alert('Tidak dapat terhubung ke server.');
      }
    }

    // Auto cek setiap 30 detik
    setInterval(async () => {
      try {
        const res = await fetch('/api/admin/check-maintenance');
        const data = await res.json();
        if (!data.maintenance) window.location.href = '/app.html';
      } catch {}
    }, 30000);
  </script>
</body>
</html>
